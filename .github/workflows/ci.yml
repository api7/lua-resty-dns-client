name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]


jobs:
  ci:
    runs-on: "ubuntu-22.04"
    env:
      OPENRESTY_PREFIX: "/usr/local/openresty"

    steps:
      - uses: actions/checkout@v4

      - name: Install CoreDNS
        run: |
          wget https://github.com/coredns/coredns/releases/download/v1.11.3/coredns_1.11.3_linux_amd64.tgz
          tar xzf coredns_1.11.3_linux_amd64.tgz
          sudo mv coredns /bin/
          sudo chmod +x /bin/coredns
          coredns -version

      - name: Linux Get dependencies
        run: |
          sudo apt install -y cpanminus build-essential libncurses5-dev libreadline-dev libssl-dev perl lua5.1 liblua5.1-0-dev
          curl -fsSL https://raw.githubusercontent.com/apache/apisix/master/utils/linux-install-luarocks.sh | sh

      - name: Linux Before install
        run: |
          sudo cpanm --notest Test::Nginx > build.log 2>&1 || (cat build.log && exit 1)
          sudo luarocks install luacheck > build.log 2>&1 || (cat build.log && exit 1)
          sudo luarocks install busted > build.log 2>&1 || (cat build.log && exit 1)

      - name: Linux Install
        run: |
          wget -qO - https://openresty.org/package/pubkey.gpg | sudo apt-key add -
          sudo apt-get -y install software-properties-common
          sudo add-apt-repository -y "deb http://openresty.org/package/ubuntu $(lsb_release -sc) main"
          sudo apt-get update
          sudo apt-get install openresty

      - name: Start CoreDNS
        run: |
          nohup coredns -conf t/testdata/Corefile > coredns.log 2>&1 &
          sleep 2
          cat coredns.log | grep "CoreDNS-1.11"

      - name: Linux Script
        run: |
          export PATH=$OPENRESTY_PREFIX/nginx/sbin:$PATH
          sudo make deps > build.log 2>&1 || (cat build.log && exit 1)
          make test
